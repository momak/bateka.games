<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Bateka | Games</title>
    <script>
        var l = window.location;
        var base = '/bateka.games';
        var path = l.pathname.slice(base.length);
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            base + '/?p=' + path.replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
